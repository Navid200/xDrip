<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Redirecting…</title>
    <script>
      (function() {
        // Get the current path
        var oldPath = window.location.pathname;

        // Remove /xDrip/ from the path
        oldPath = oldPath.replace("/xDrip/", "/");
        // Remove /Nightscout/ from the path
        oldPath = oldPath.replace("/Nightscout/", "/");

        // Construct new URL
        var newURL = "https://google-cloud-nightscout.github.io" + oldPath;

        // Redirect automatically
        window.location.replace(newURL);
      })();
    </script>
  </head>
  <body>
    <noscript>
      <p>
        Automatic redirect is not working because JavaScript is disabled in your browser.</p>
      <p>
        The Google Cloud Nightscout guide has moved to 
        <a href="https://google-cloud-nightscout.github.io/">https://google-cloud-nightscout.github.io/</a>.</p>
      <p>
        Please visit that site to update your bookmarks.
      </p>
    </noscript>
  </body>
</html>
